<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Insurance Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        h2 {
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
        }

        .gender {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>

</head>
<body>

    <div class="container">
        <h2>Car Insurance Registration</h2>

        <form>

            <div class="form-group">
                <label>Name:</label>
                <input type="text" id="name" required>
            </div>

            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="email" required>
            </div>

            <div class="form-group">
                <label>Gender:</label>
                <div class="gender">
                    <label><input type="radio" name="gender" required> Male</label>
                    <label><input type="radio" name="gender"> Female</label>
                    <label><input type="radio" name="gender"> Other</label>
                </div>
            </div>

            <div class="form-group">
                <label>Car Brand:</label>
                <select id="cars">
                    <option>BMW</option>
                    <option>Audi</option>
                    <option>Mercedez</option>
                </select>
            </div>

            <div class="form-group">
                <label>Car Age:</label>
                <input type="number" id="carage" required>
            </div>

            <div class="form-group">
                <label>Date of Purchase:</label>
                <input type="date" id="dop" required>
            </div>

            <div class="form-group">
                <label>Password:</label>
                <input type="password" id="password" required>
            </div>

            <button type="submit">Submit</button>

        </form>
    </div>

</body>
</html>
